name: eco_habit_diary
description: "Дневник экологических привычек — отслеживайте зелёные привычки и спасайте планету"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.3
  get: ^4.6.6
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2
  uuid: ^4.4.2
  intl: ^0.20.2
  google_fonts: ^6.2.1
  curved_navigation_bar: ^1.0.6
  pdf: ^3.11.1
  printing: ^5.13.1
  shared_preferences: ^2.3.2
  share_plus: ^10.0.2
  path_provider: ^2.1.3
  timezone: ^0.9.4
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - lib/assets/Roboto-Regular.ttf
